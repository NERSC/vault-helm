{{- if and .Values.tlsAcme.enabled .Values.tlsAcme.cert.createPlaceholder -}}
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: {{ .Values.tlsAcme.cert.secretName }}
  labels:
    {{- include "openbao-wrapper.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install"
    "helm.sh/hook-delete-policy": "before-hook-creation"
data:
{{ include "openbao-wrapper.gen-certs" . | indent 2 }}
{{- end }}
